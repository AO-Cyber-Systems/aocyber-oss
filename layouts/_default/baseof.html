<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="brand" href="{{ .Site.BaseURL }}">AO Cyber Systems</a>
      <nav>
        <a href="https://github.com/{{ .Site.Params.githubOrg }}">GitHub</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="site-footer">
    <div class="container">
      <p>© {{ now.Year }} AO Cyber Systems. Released under open source licenses — see each repository.</p>
    </div>
  </footer>
</body>
</html>
