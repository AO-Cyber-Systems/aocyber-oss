<article class="product-card glass" {{ with .repo }}data-href="{{ . }}"{{ end }}>
  <div class="product-card-inner">
    {{- with .language }}
    <span class="badge badge--available" aria-label="Language: {{ . }}">{{ . }}</span>
    {{- end }}
    <h3 class="product-card-name">{{ .name }}</h3>
    {{- with .tagline }}
    <p class="product-card-tagline">{{ . }}</p>
    {{- end }}
    {{- with .description }}
    <p class="product-card-desc">{{ . }}</p>
    {{- end }}
    {{- with .repo }}
    <a href="{{ . }}" class="btn btn--outline btn--sm product-card-cta">
      View on GitHub
      <svg class="btn-arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M1 7h12m0 0L8 2.5M13 7l-5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>
    {{- end }}
  </div>
</article>
